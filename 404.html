  <style>
    .error-hero {
      min-height: calc(100dvh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.25rem 4rem;
      position: relative;
      overflow: hidden;
    }

    .error-orb-a {
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(180, 220, 200, 0.28), transparent 70%);
      top: -80px;
      right: -100px;
      pointer-events: none;
    }

    .error-orb-b {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(219, 196, 155, 0.22), transparent 70%);
      bottom: 0;
      left: -80px;
      pointer-events: none;
    }

    .error-inner {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 440px;
    }

    .error-emoji {
      font-size: 4.2rem;
      line-height: 1;
      margin-bottom: 1.2rem;
      display: block;
      animation: bob 3.6s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .error-code {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #2f7a67;
      background: rgba(47, 122, 103, 0.08);
      border: 1px solid rgba(47, 122, 103, 0.18);
      border-radius: 999px;
      padding: 0.28rem 0.75rem;
      margin-bottom: 1rem;
    }

    .error-title {
      font-size: 1.65rem;
      font-weight: 900;
      line-height: 1.25;
      color: #1e2a34;
      margin: 0 0 0.9rem;
    }

    .error-desc {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #6b5a3e;
      margin: 0 0 2rem;
    }

    .error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }

    .error-hint {
      margin-top: 2.5rem;
      font-size: 0.76rem;
      color: #9b8f82;
    }

    /* Dark mode */
    [data-theme="dark"] .error-title { color: #f0e8da; }
    [data-theme="dark"] .error-desc  { color: #c7baaa; }
    [data-theme="dark"] .error-hint  { color: #7a6f65; }
    [data-theme="dark"] .error-code  {
