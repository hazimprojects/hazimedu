<svg viewBox="0 0 200 44" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon mark — nested SVG preserves its own coordinate space -->
  <svg x="0" y="0" width="44" height="44" viewBox="0 0 100 100">
    <defs>
      <linearGradient id="logo-bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#9B77FF"/>
        <stop offset="100%" stop-color="#55B5FF"/>
      </linearGradient>
    </defs>
    <rect width="100" height="100" rx="22" fill="url(#logo-bg)"/>
    <path d="M22 29L78 29L22 71L78 71"
          fill="none" stroke="white" stroke-width="9"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="78" cy="29" r="7" fill="#FF9B6A"/>
    <circle cx="22" cy="71" r="5.5" fill="#6ADBB8"/>
  </svg>

  <!-- Wordmark: "Zym" violet + "Notes" dark -->
  <text x="54" y="22"
        font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif"
        font-size="25" font-weight="800"
        dominant-baseline="middle">
    <tspan fill="#9B77FF">Zym</tspan><tspan fill="#1E2A34">Notes</tspan>
  </text>
</svg>
