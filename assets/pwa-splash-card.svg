<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 780" width="450" height="780" role="img" aria-labelledby="splash-title">
  <title id="splash-title">ZymNotes  Nota Ulang Kaji Generasi Baharu</title>
  <defs>
    <linearGradient id="splash-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2540"/>
      <stop offset="55%" stop-color="#171320"/>
      <stop offset="100%" stop-color="#0b0910"/>
    </linearGradient>
    <linearGradient id="splash-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.09)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <linearGradient id="splash-icon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9B77FF"/>
      <stop offset="100%" stop-color="#55B5FF"/>
    </linearGradient>
    <filter id="splash-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="24" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="450" height="780" fill="url(#splash-bg)"/>
  <circle cx="380" cy="120" r="140" fill="#9B77FF" opacity="0.12" filter="url(#splash-glow)"/>
  <circle cx="90" cy="620" r="160" fill="#55B5FF" opacity="0.08" filter="url(#splash-glow)"/>

  <!-- Card panel -->
  <rect x="28" y="48" width="394" height="684" rx="28" fill="url(#splash-card)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- ZN icon -->
  <g transform="translate(165 108)">
    <rect width="120" height="120" rx="26" fill="url(#splash-icon)"/>
    <g transform="translate(60 60) scale(0.72) translate(-50 -50)">
      <path d="M18 28L46 28L18 68L46 68" fill="none" stroke="#fff" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M54 68L54 28L82 68L82 28" fill="none" stroke="#fff" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="46" cy="28" r="6.5" fill="#FF9B6A"/>
      <circle cx="54" cy="68" r="5" fill="#6ADBB8"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="225" y="300" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', 'Plus Jakarta Sans', sans-serif" font-size="38" font-weight="800" fill="#fff" letter-spacing="-0.02em">Zym<tspan fill="#B8A3FF">Notes</tspan></text>

  <text x="225" y="346" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#9B77FF" letter-spacing="0.22em">NOTA ULANG KAJI GENERASI BAHARU</text>

  <text x="225" y="388" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.72)">Nota visual untuk pelajar SPM</text>
  <text x="225" y="414" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.55)">Berpandukan buku teks KSSM</text>

  <!-- Feature chips -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">
    <rect x="78" y="456" width="130" height="36" rx="10" fill="rgba(155,119,255,0.2)" stroke="rgba(155,119,255,0.35)"/>
    <text x="143" y="479" text-anchor="middle" fill="#E8E4FF">Visual &amp; tersusun</text>
    <rect x="222" y="456" width="150" height="36" rx="10" fill="rgba(85,181,255,0.16)" stroke="rgba(85,181,255,0.35)"/>
    <text x="297" y="479" text-anchor="middle" fill="#D4ECFF">Mesra telefon</text>
  </g>
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600">
    <rect x="108" y="506" width="234" height="36" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
    <text x="225" y="529" text-anchor="middle" fill="rgba(255,255,255,0.75)">Sokongan pembelajaran  bukan ganti sumber rasmi</text>
  </g>

  <!-- Footer mark -->
  <text x="225" y="668" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.35)">zymnotes.com</text>
</svg>
